<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In – The Great Automation</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #1a1d27;
      border: 1px solid #2d3148;
      border-radius: 12px;
      padding: 40px 36px;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 20px 60px rgba(0,0,0,.5);
    }
    h2 {
      font-size: 1.4rem;
      font-weight: 600;
      margin-bottom: 28px;
      color: #a78bfa;
      letter-spacing: .5px;
    }
    label { display: block; font-size: .8rem; color: #94a3b8; margin-bottom: 6px; }
    input[type="text"], input[type="password"] {
      width: 100%;
      padding: 10px 14px;
      background: #0f1117;
      border: 1px solid #2d3148;
      border-radius: 7px;
      color: #e2e8f0;
      font-size: .95rem;
      margin-bottom: 18px;
      outline: none;
      transition: border-color .2s;
    }
    input:focus { border-color: #a78bfa; }
    input[type="submit"] {
      width: 100%;
      padding: 11px;
      background: #a78bfa;
      border: none;
      border-radius: 7px;
      color: #0f1117;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .2s;
    }
    input[type="submit"]:hover { background: #c4b5fd; }
    .error { color: #f87171; font-size: .85rem; margin-bottom: 16px; }
  </style>
</head>
<body>
  <div class="card">
    <h2>⚡ The Great Automation</h2>
    {% if error %}<p class="error">{{ error }}</p>{% endif %}
    <form method="POST">
      <label>Username</label>
      <input type="text" name="username" required autofocus>
      <label>Password</label>
      <input type="password" name="password" required>
      <input type="submit" value="Sign In">
    </form>
  </div>
</body>
</html>
